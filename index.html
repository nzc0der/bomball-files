<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: #0f0f0f;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            padding: 40px;
        }

        h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            color: #aaa;
        }

        .dot {
            display: inline-block;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Coming Soon<span class="dot">.</span></h1>
        <p>Something awesome is on the way.</p>
    </div>
</body>
</html>
